services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: breakfast_pos
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d breakfast_pos"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      BACKEND_PORT: 3001
      RUN_MIGRATIONS: "true"
      PRISMA_DB_PUSH_FALLBACK: "true"
      DATABASE_URL: postgresql://pos_user:pos_password@postgres:5432/breakfast_pos
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      LINE_NOTIFY_TOKEN: ${LINE_NOTIFY_TOKEN}
      PRINTER_IP: ${PRINTER_IP}
      PRINTER_PORT: ${PRINTER_PORT}
      FOODPANDA_WEBHOOK_SECRET: ${FOODPANDA_WEBHOOK_SECRET}
      UBEREATS_WEBHOOK_SECRET: ${UBEREATS_WEBHOOK_SECRET}
      DAILY_SALES_TARGET: ${DAILY_SALES_TARGET}
      UPLOAD_DIR: /app/uploads
      FRONTEND_URL: http://localhost:8080
      ADMIN_URL: http://localhost:8080
      CORS_ORIGINS: http://localhost:3000,http://localhost:3002,http://localhost:8080
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3000
      VITE_API_BASE_URL: http://localhost:8080/api
      VITE_SOCKET_URL: http://localhost:8080

  admin:
    build:
      context: ./admin
    ports:
      - "3002:3002"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3002
      VITE_API_BASE_URL: http://localhost:8080/api

  gateway:
    build:
      context: ./gateway
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
      admin:
        condition: service_started
    environment:
      PORT: 8080
      FRONTEND_UPSTREAM: frontend:3000
      ADMIN_UPSTREAM: admin:3002
      BACKEND_UPSTREAM: backend:3001

volumes:
  postgres_data:
  backend_uploads:
